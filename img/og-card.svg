<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="The Oragon Gazette — Dennis Pitallano">
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.58  0 0 0 0 0.50  0 0 0 0 0.40  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <pattern id="halftone" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.3" fill="#1a1a1a"/>
    </pattern>
  </defs>

  <!-- Paper -->
  <rect width="1200" height="630" fill="#f1e7cf"/>
  <rect width="1200" height="630" fill="url(#halftone)" opacity="0.05"/>
  <rect width="1200" height="630" filter="url(#paper)" opacity="0.6"/>

  <!-- Outer border -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <rect x="34" y="34" width="1132" height="562" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Masthead bar -->
  <line x1="50" y1="70" x2="1150" y2="70" stroke="#1a1a1a" stroke-width="1"/>
  <text x="70" y="62" font-family="Georgia, 'Old Standard TT', serif" font-size="16" fill="#1a1a1a" letter-spacing="2">VOL. MMXXVI · NO. I</text>
  <text x="600" y="62" font-family="Georgia, 'Old Standard TT', serif" font-size="16" fill="#1a1a1a" text-anchor="middle" letter-spacing="3">EST. ANNO DOMINI · PORTFOLIO EDITION</text>
  <text x="1130" y="62" font-family="Georgia, 'Old Standard TT', serif" font-size="16" fill="#1a1a1a" text-anchor="end" letter-spacing="2">PRICE: ONE CUP OF COFFEE</text>

  <!-- Title -->
  <text x="600" y="180" font-family="'UnifrakturCook', 'Old English Text MT', Georgia, serif" font-weight="700" font-size="120" fill="#1a1a1a" text-anchor="middle">The Oragon Gazette</text>

  <!-- Double rule -->
  <line x1="80" y1="210" x2="1120" y2="210" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="80" y1="218" x2="1120" y2="218" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Latin motto -->
  <text x="600" y="250" font-family="Georgia, 'Old Standard TT', serif" font-style="italic" font-size="20" fill="#1a1a1a" text-anchor="middle" letter-spacing="4">“CODICEM · SCRIBENDI · ARS · HUMANA”</text>

  <!-- Kicker -->
  <text x="600" y="300" font-family="'Special Elite', 'Courier New', monospace" font-size="22" fill="#9a1e1e" text-anchor="middle" letter-spacing="6">— FRONT PAGE · LATE EDITION —</text>

  <!-- Headline -->
  <text x="600" y="370" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="58" fill="#1a1a1a" text-anchor="middle">DENNIS PITALLANO</text>
  <text x="600" y="420" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-style="italic" font-size="32" fill="#1a1a1a" text-anchor="middle">Full-Stack Developer · Set in Hot-Metal Type</text>

  <!-- Tagline columns -->
  <line x1="600" y1="455" x2="600" y2="555" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="2,3"/>
  <text x="320" y="485" font-family="Georgia, 'Old Standard TT', serif" font-size="18" fill="#1a1a1a" text-anchor="middle">.NET · TypeScript · Azure</text>
  <text x="320" y="512" font-family="Georgia, 'Old Standard TT', serif" font-size="18" fill="#1a1a1a" text-anchor="middle">React · Node · SQL</text>
  <text x="320" y="539" font-family="Georgia, 'Old Standard TT', serif" font-size="18" fill="#1a1a1a" text-anchor="middle">— Philippines · Remote —</text>
  <text x="880" y="485" font-family="Georgia, 'Old Standard TT', serif" font-size="18" fill="#1a1a1a" text-anchor="middle">Distributed Systems</text>
  <text x="880" y="512" font-family="Georgia, 'Old Standard TT', serif" font-size="18" fill="#1a1a1a" text-anchor="middle">Clean Architecture</text>
  <text x="880" y="539" font-family="Georgia, 'Old Standard TT', serif" font-size="18" fill="#1a1a1a" text-anchor="middle">Honest Documentation</text>

  <!-- Bottom rule -->
  <line x1="80" y1="575" x2="1120" y2="575" stroke="#1a1a1a" stroke-width="1"/>
  <text x="600" y="598" font-family="Georgia, 'Old Standard TT', serif" font-size="14" fill="#1a1a1a" text-anchor="middle" letter-spacing="4">dennispitallano.github.io · ALL THE NEWS THAT'S FIT TO COMMIT</text>
</svg>
