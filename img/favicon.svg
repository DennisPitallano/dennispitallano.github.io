<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Paper background -->
  <rect width="64" height="64" rx="6" fill="#f1e7cf"/>
  <!-- Subtle inner border -->
  <rect x="4" y="4" width="56" height="56" rx="4" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="7" y="7" width="50" height="50" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75"/>
  <!-- Blackletter G -->
  <text x="32" y="50"
        font-family="'UnifrakturCook', 'Old English Text MT', Georgia, serif"
        font-weight="700"
        font-size="52"
        fill="#1a1a1a"
        text-anchor="middle">G</text>
  <!-- Red accent dot -->
  <circle cx="48" cy="14" r="2.5" fill="#9a1e1e"/>
</svg>
